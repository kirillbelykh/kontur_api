[mypy]
python_version = 3.12
exclude = (^\.venv/|^__pycache__/|^tests/|^main\.py$)
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
explicit_package_bases = True
files = api.py,cookies.py,cryptopro.py,get_gtin.py,get_thumb.py,history_db.py,logger.py,options.py,update.py,utils.py,winhttp.py
